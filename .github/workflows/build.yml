name: Build Dragonic Vernosa APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Compile TypeScript -> assets/web/app.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build web TS
        working-directory: web-src
        run: |
          npm install
          npm run build

      # 2. Setup Java + Android SDK + NDK + CMake
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          sdkmanager --install "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # 3. Build APK (debug — gak perlu signing key buat testing)
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonic-vernosa-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
